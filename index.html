        let currentSong = 0;
        let isPlaying = false;
        let ytPlayer = null;

        function updateDisplay() {
            const song = songs[currentSong];
            document.getElementById('songNum').textContent = currentSong + 1;
            document.getElementById('songTitle').textContent = song.title;
            document.getElementById('videoFrame').src = song.url;
            
            const lyricsDiv = document.getElementById('lyricsContainer');
            lyricsDiv.textContent = song.lyrics;

            updateSongButtons();
            document.getElementById('playBtn').textContent = '▶ Play';
            isPlaying = false;
        }

        function updateSongButtons() {
            const selector = document.getElementById('songSelector');
            selector.innerHTML = '';
            songs.forEach((song, index) => {
                const btn = document.createElement('button');
                btn.className = 'song-btn' + (index === currentSong ? ' active' : '');
                btn.textContent = (index + 1) + '. ' + song.title.substring(0, 12);
                btn.onclick = () => goToSong(index);
                selector.appendChild(btn);
            });
        }

        function goToSong(index) {
            if (index < 0 || index >= songs.length) return;
            currentSong = index;
            isPlaying = false;
            updateDisplay();
        }

        function previousSong() {
            goToSong(currentSong - 1);
        }

        function nextSong() {
            goToSong(currentSong + 1);
        }

        function togglePlayVideo() {
            isPlaying = !isPlaying;
            const playBtn = document.getElementById('playBtn');
            const iframe = document.getElementById('videoFrame');
            
            if (isPlaying) {
                playBtn.textContent = '⏸ Pause';
                // Reproducir video: agregar autoplay a la URL del iframe
                const currentUrl = iframe.src.split('?')[0];
                iframe.src = currentUrl + '?autoplay=1';
            } else {
                playBtn.textContent = '▶ Play';
                // Pausar video: recargar sin autoplay
                const currentUrl = iframe.src.split('?')[0];
                iframe.src = currentUrl;
            }
        }

        document.getElementById('totalSongs').textContent = songs.length;
        updateDisplay();
    </script>
